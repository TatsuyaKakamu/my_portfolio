name: Update training data

on:
  schedule:
    # Monthly on the 1st at 00:00 UTC = 09:00 JST.
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Garmin token secret
        env:
          GARMIN_TOKEN_STORE_B64: ${{ secrets.GARMIN_TOKEN_STORE_B64 }}
        run: |
          if [ -z "$GARMIN_TOKEN_STORE_B64" ]; then
            echo "::error::GARMIN_TOKEN_STORE_B64 secret is not configured (mint it with scripts/garmin_login.py)"
            exit 1
          fi

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch Garmin activities
        env:
          GARMIN_TOKEN_STORE_B64: ${{ secrets.GARMIN_TOKEN_STORE_B64 }}
        run: python scripts/garmin_fetch.py

      - name: Aggregate training data
        run: node scripts/training-update-monthly.mjs

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src/data/training-data.json; then
            echo "No changes to training-data.json"
            exit 0
          fi
          git add src/data/training-data.json
          git commit -m "chore(training): update monthly training data"
          git push origin main
          # A push made with GITHUB_TOKEN does not trigger the on:push deploy
          # workflow (recursive-run prevention), so trigger it explicitly.
          # workflow_dispatch is an exception that fires even with GITHUB_TOKEN.
          gh workflow run deploy.yml --ref main
