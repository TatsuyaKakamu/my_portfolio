name: Sync & Deploy

on:
  schedule:
    # Daily at 21:00 UTC (06:00 JST)
    - cron: "0 21 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: sync-and-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Sync GitHub repositories
        env:
          GITHUB_USERNAME: ${{ vars.PORTFOLIO_GITHUB_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PORTFOLIO_TOPIC: ${{ vars.PORTFOLIO_TOPIC }}
          PORTFOLIO_ALLOWLIST: ${{ vars.PORTFOLIO_ALLOWLIST }}
        run: npm run sync:github

      - name: Sync Strava summary
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: npm run sync:strava

      - name: Verify certifications (weekly, Mondays only)
        if: github.event.schedule == '0 21 * * *' && github.event.repository.updated_at
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            npm run sync:certifications
          else
            echo "skipping certification check (not Monday)"
          fi

      - name: Commit updated data (if changed)
        run: |
          if [[ -n "$(git status --porcelain src/data)" ]]; then
            git config user.name "portfolio-bot"
            git config user.email "portfolio-bot@users.noreply.github.com"
            git add src/data
            git commit -m "chore(data): sync external sources"
            git push
          else
            echo "no data changes"
          fi

      - name: Build site
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist
          if-no-files-found: error
          retention-days: 7
