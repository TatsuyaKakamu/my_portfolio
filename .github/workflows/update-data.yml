name: update-portfolio-data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/fetch-github.mjs
        env:
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: node scripts/fetch-strava.mjs
        env:
          STRAVA_ACCESS_TOKEN: ${{ secrets.STRAVA_ACCESS_TOKEN }}
          STRAVA_ATHLETE_ID: ${{ secrets.STRAVA_ATHLETE_ID }}
      - run: node scripts/check-certification.mjs
      - run: |
          if [ -n "$(git status --porcelain data/normalized data/raw)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/normalized data/raw
            git commit -m "chore: update normalized external data"
            git push
          fi
