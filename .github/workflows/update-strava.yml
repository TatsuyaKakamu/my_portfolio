name: Update Strava training data

on:
  # Strava/Garmin 連携を停止したため自動取得を無効化（毎月の失敗を防ぐ）。
  # 取得スクリプトは残しているので、再開時は下の schedule を復活させる。
  # schedule:
  #   # Monthly on the 1st at 00:00 UTC = 09:00 JST.
  #   - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Verify Strava secrets
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          if [ -z "$STRAVA_CLIENT_ID" ] || [ -z "$STRAVA_CLIENT_SECRET" ] || [ -z "$STRAVA_REFRESH_TOKEN" ]; then
            echo "::error::STRAVA_* secrets are not configured"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Fetch last month's Strava data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: node scripts/strava-update-monthly.mjs

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src/data/training-data.json; then
            echo "No changes to training-data.json"
            exit 0
          fi
          git add src/data/training-data.json
          git commit -m "chore(strava): update monthly training data"
          git push origin main
          # A push made with GITHUB_TOKEN does not trigger the on:push deploy
          # workflow (recursive-run prevention), so trigger it explicitly.
          # workflow_dispatch is an exception that fires even with GITHUB_TOKEN.
          gh workflow run deploy.yml --ref main
